kind = "web"
previewPath = "/"
title = "ИИ-тренажёр продаж"
version = "1.0.0"
id = "artifacts/ai-sales-trainer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22678

[services.development]
run = "pnpm --filter @workspace/ai-sales-trainer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-sales-trainer", "run", "build" ]
publicDir = "artifacts/ai-sales-trainer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22678"
BASE_PATH = "/"
